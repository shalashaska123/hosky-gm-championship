<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOSKY GM CHAMPIONSHIP</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav class="navbar">
    <div class="nav-left">
      <img
        src="https://hosky.io/wp-content/uploads/2022/01/hosky-logo.png"
        alt="Hosky"
        class="logo"
        onerror="this.style.display='none'"
      >
      <span class="nav-title">HOSKY GM CHAMPIONSHIP</span>
    </div>
    <div class="nav-right">
      <button id="wallet-btn" class="btn-wallet">Connect Wallet</button>
      <div id="wallet-pill" class="wallet-pill" style="display:none"></div>
    </div>
  </nav>

  <div class="container">

    <!-- HERO STATS -->
    <div class="hero-grid">
      <div class="card stat-card">
        <span class="stat-label">Next Deadline</span>
        <span id="countdown" class="stat-value">Loading...</span>
      </div>
      <div class="card stat-card">
        <span class="stat-label">Total Prize Pool</span>
        <span id="prize-pool" class="stat-value">TBD</span>
      </div>
      <div class="card stat-card">
        <span class="stat-label">Active Managers</span>
        <span id="manager-count" class="stat-value">-</span>
      </div>
      <div class="card stat-card">
        <span class="stat-label">Current Gameweek</span>
        <span id="current-gw" class="stat-value">-</span>
      </div>
    </div>

    <!-- MAIN GRID -->
    <div class="main-grid">

      <!-- LEFT COLUMN -->
      <div class="left-col">

        <!-- FIXTURES -->
        <div class="card">
          <h2 class="card-title">Weekly Fixtures</h2>
          <div id="fixtures-list" class="fixtures-list">
            <div class="empty-state">Loading fixtures...</div>
          </div>
        </div>

        <!-- STANDINGS TABS -->
        <div class="card">
          <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('classic')">Classic</button>
            <button class="tab-btn" onclick="switchTab('h2h')">H2H</button>
            <button class="tab-btn" onclick="switchTab('cup')">Cup</button>
          </div>
          <div id="standings-body"></div>
        </div>

      </div>

      <!-- RIGHT COLUMN -->
      <div class="right-col">

        <!-- PRIZE POOL -->
        <div class="card">
          <h2 class="card-title">Prize Pool</h2>
          <div id="prize-list" class="prize-list"></div>
        </div>

        <!-- LINK FPL TEAM — always visible, input disabled until wallet connected -->
        <div class="card" id="link-card">
          <h2 class="card-title">Link FPL Team</h2>
          <input
            type="text"
            id="fpl-id-input"
            placeholder="Connect wallet first..."
            disabled
            class="text-input"
          >
          <p class="input-note">Connect your Cardano wallet to link your FPL team.</p>
        </div>

        <!-- MANAGER DOSSIER — hidden until wallet + FPL ID linked -->
        <div class="card" id="dossier-card" style="display:none">
          <h2 class="card-title">Manager Dossier</h2>
          <div id="dossier-content"></div>
        </div>

      </div>
    </div>
  </div>

  <footer class="footer">
    <p>Powered by <a href="https://fantasy.premierleague.com" target="_blank">Fantasy Premier League</a> &nbsp;|&nbsp; Built on Cardano</p>
  </footer>

  <!-- CONFIG MUST LOAD BEFORE APP -->
  <script src="config.js"></script>

  <!-- MESHJS — loaded last so DOM and config are ready -->
  <script>
    // Dynamically load MeshJS and set a global flag when ready
    (function() {
      var s = document.createElement('script');
      s.src = 'https://unpkg.com/@meshsdk/core@1.7.4/dist/mesh.browser.js';
      s.onload = function() { console.log('MeshJS loaded:', typeof window.Mesh || typeof window.mesh); };
      s.onerror = function() { console.warn('MeshJS failed to load from unpkg, trying jsdelivr...');
        var s2 = document.createElement('script');
        s2.src = 'https://cdn.jsdelivr.net/npm/@meshsdk/core@1.7.4/dist/mesh.browser.js';
        document.head.appendChild(s2);
      };
      document.head.appendChild(s);
    })();
  </script>

  <script src="app.js"></script>

</body>
</html>
